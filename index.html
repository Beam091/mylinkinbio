        body {
            font-family: 'Inter', 'Sarabun', sans-serif;

                radial-gradient(at 50% 50%, rgba(99, 102, 241, 0.08) 0px, transparent 50%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0b0f19;
        }
        ::-webkit-scrollbar-thumb {
            background: #1f2937;
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #374151;
        }

        /* Glassmorphism card style */
        .glass-card {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulseGlow {
            0%, 100% {
                opacity: 0.5;
                transform: scale(1);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.05);
            }
        }

        .animate-fade-down {
            animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-fade-up {
            opacity: 0;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .glow-effect {
            position: relative;
        }
        .glow-effect::after {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
            border-radius: inherit;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
            filter: blur(8px);
        }
        .glow-effect:hover::after {
            opacity: 0.65;
        }

        /* Success Toast style */
        .toast-active {
            transform: translate(-50%, 0) scale(1) !important;
            opacity: 1 !important;
        }
    </style>

    <script>
        // Check for Gmail action (Android compatibility toast)
        function handleGmailAction(event) {
            const isAndroid = /Android/i.test(navigator.userAgent);
            const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
            
            let message, iconClass;

            if (isAndroid) {
                iconClass = 'fa-paper-plane';
                message = 'กำลังเลือกแอปเมล...';
            } else if (isIOS) {
                iconClass = 'fa-paper-plane';
                message = 'กำลังเปิดแอปเมล...';
            } else {
                iconClass = 'fa-envelope-open-text';
                message = 'เปิดหน้าเขียนเมล...';
            }

            showToast(iconClass, message);
        }

        // Standard Copy Functionality (Phone Button)
        function copyToClipboard(text, iconClass, message) {
            const tempInput = document.createElement('input');
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            tempInput.setSelectionRange(0, 99999);

            try {
                const success = document.execCommand('copy');
                if (success) {
                    showToast(iconClass, message);
                } else {
                    fallbackClipboard(text, iconClass, message);
                }
            } catch (err) {
                fallbackClipboard(text, iconClass, message);
            }
            
            document.body.removeChild(tempInput);
        }

        function fallbackClipboard(text, iconClass, message) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text)
                    .then(() => showToast(iconClass, message))
                    .catch(() => alert('ไม่สามารถคัดลอกได้โดยอัตโนมัติ กรุณาคัดลอกด้วยตนเอง'));
            }
        }

        // Common Toast Display function
        function showToast(iconClass, message) {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toast-icon');
            const toastMsg = document.getElementById('toast-message');
            
            toastIcon.className = `fa-solid ${iconClass} text-lg`;
            toastMsg.innerText = message;
            toast.classList.add('toast-active');
            
            setTimeout(() => {
                toast.classList.remove('toast-active');
            }, 2500);
        }
    </script>
